server:
  port: 8080

spring:
  application:
    name: gateway

  boot:
    admin:
      client:
        url: http://localhost:9090
        instance:
          prefer-ip-address: true
          service-url: "http://localhost:8080"

  cloud:
    gateway:
      default-filters:
        - RemoveRequestHeader=Cookie
        - PreserveHostHeader

      routes:
        - id: motorcycle-service
          uri: http://localhost:8585
          predicates:
            - Path=/motorcycles/api/v1/**

        - id: cinema-service
          uri: http://localhost:8583
          predicates:
            - Path=/cinema/api/v1/**

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

